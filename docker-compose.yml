version: '3.8'

services:
  wealth-tracker:
    container_name: wealth_tracker
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - '3000:3000'
    env_file:
      - .env        # Copy .env.example → .env and set DB_PASSWORD before running
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
